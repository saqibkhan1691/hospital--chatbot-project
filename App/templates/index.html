<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Welcome to Hospital Chatbot</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; background:#f5f7fb; margin:0; padding:0}
    .hero{background:#0b5ed7;color:#fff;padding:30px 20px;text-align:center}
    .container{max-width:800px;margin:20px auto;padding:10px}
    .chat-window{background:#fff;border-radius:8px;padding:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .messages{height:400px;overflow:auto;border:1px solid #eee;padding:10px;border-radius:6px}
    .msg{margin:8px 0}
    .msg.user{text-align:right}
    .msg.bot{text-align:left}
    .input-row{display:flex;margin-top:10px}
    input[type=text]{flex:1;padding:10px;border:1px solid #ddd;border-radius:6px}
    button{margin-left:8px;padding:10px 14px;background:#0b5ed7;color:#fff;border:none;border-radius:6px}
    .meta{font-size:13px;color:#666;margin-top:8px}
    .welcome{font-size:22px;margin-bottom:6px}
  </style>
</head>
<body>
  <div class="hero">
    <h1>Welcome to Hospital Chatbot</h1>
    <p>Fast. Simple. Multilingual (English + Hinglish friendly).</p>
  </div>

  <div class="container">
    <div class="chat-window">
      <div class="welcome">How can I help you today?</div>
      <div class="messages" id="messages"></div>

      <div class="input-row">
        
        <input id="inp" type="text" placeholder="Ask Anything"/>
        <button id="send">Send</button>
      </div>
      <div class="meta">Tip: Try English or Roman Hindi (Hinglish). Example: "Mujhe cardiologist ka appointment chahiye 21 Nov 10am, 98765..."</div>
    </div>
  </div>

<script>
const messagesEl = document.getElementById('messages');
const inp = document.getElementById('inp');
const send = document.getElementById('send');
const nameEl = document.getElementById('name');

function appendMessage(text, who='bot'){
  const d = document.createElement('div');
  d.className = 'msg ' + (who==='user' ? 'user' : 'bot');
  d.innerText = text;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

send.onclick = async () => {
  const txt = inp.value.trim();
  const nm = nameEl.value.trim();
  if(!txt) return;
  appendMessage(txt, 'user');
  inp.value = '';
  appendMessage('...', 'bot');
  try{
    const resp = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: txt, name: nm})
    });
    const j = await resp.json();
    // remove last '...' message
    const nodes = messagesEl.querySelectorAll('.msg.bot');
    if(nodes.length) nodes[nodes.length-1].remove();
    appendMessage(j.response, 'bot');
  }catch(e){
    // show error
    const nodes = messagesEl.querySelectorAll('.msg.bot');
    if(nodes.length) nodes[nodes.length-1].remove();
    appendMessage('Error connecting to server. Make sure app.py is running.', 'bot');
  }
};

inp.addEventListener("keydown", function(e){
  if(e.key === "Enter") send.click();
});
</script>

</body>
</html>
